# Deploy Workers + assets (wrangler.toml: main = worker.js, [assets])
# Secret required: CLOUDFLARE_API_TOKEN
# (API Token with Edit Cloudflare Workers permission)

name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-castwing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bust asset cache
        run: |
          # Append a deploy-time comment to index.html so its hash
          # always differs, forcing wrangler to re-upload it.
          echo "<!-- deploy:$(date +%s) -->" >> index.html
          echo "index.html size: $(wc -c < index.html) bytes"
          echo "index.html md5:  $(md5sum index.html | cut -d' ' -f1)"

      - name: Install and deploy
        run: |
          npm install -g wrangler@3
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
