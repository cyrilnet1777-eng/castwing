# Déploiement Workers + assets (wrangler.toml : main = worker.js, [assets])
# Secret requis une fois dans le dépôt GitHub : CLOUDFLARE_API_TOKEN
# (API Token avec permission Edit Cloudflare Workers)

name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-castwing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
