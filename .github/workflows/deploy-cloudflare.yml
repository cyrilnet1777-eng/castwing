# Deploy Workers + assets (wrangler.toml: main = worker.js, [assets])
# Secret required: CLOUDFLARE_API_TOKEN
# (API Token with Edit Cloudflare Workers permission)

name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-castwing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy
        run: wrangler deploy --verbose 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
