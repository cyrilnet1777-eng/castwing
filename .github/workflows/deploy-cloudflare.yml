# Deploy Workers + assets (wrangler.toml: main = worker.js, [assets])
# Secret required: CLOUDFLARE_API_TOKEN
# (API Token with Edit Cloudflare Workers permission)

name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-castwing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bust asset cache
        run: |
          # Inject a deploy-time timestamp into index.html so wrangler
          # always detects it as changed and re-uploads it.
          sed -i "s/<!-- build:[0-9]* -->/<!-- build:$(date +%s) -->/" index.html
          echo "index.html hash: $(md5sum index.html | cut -d' ' -f1)"

      - name: Install and deploy
        run: |
          npm install -g wrangler@3
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
